body:
  text: 西天中印度惹爛䭾羅國密林寺三藏賜紫沙門臣天息災奉詔譯如是我聞一時世尊在王舍城鷲峯山中與大比丘衆千二百五十人俱并諸百千俱胝那庾多菩薩復有百千俱胝那庾多梵王帝釋護世諸大衆等恭敬圍繞爾時世尊於吉祥寶藏師子座上結跏趺坐是時聖觀自在菩薩摩訶薩即從座起偏袒右肩右膝著地瞻仰尊頭目不暫捨合掌恭敬歡喜踊躍頭面禮足而白佛言世尊唯願世尊為我說是小字般若波羅蜜多經令諸衆生得聞是法獲大福德一切業障決定消除當來速獲無上菩提若有衆生發至誠心受持讀誦此真言者隨所求願決定成就無諸魔難爾時世尊告聖觀自在菩薩摩訶薩善哉善說是言善哉善哉善男子汝能如是至心為諸衆生令得安樂長壽善男子汝應諦聽至心聽我說是小字般若波羅蜜多經若諸衆生聞說是法獲大福德一切業障皆悉消除決定速證無上正等菩提若有衆生發心受持此真言者無諸魔事皆得成就是時聖觀自在菩薩摩訶薩復白佛言世尊善逝今說為諸衆生令得安樂爾時世尊而於一時入三摩地名解脫一切衆生從定起已眉間毫相放百千俱胝那庾多光明此大光明普照一切諸佛剎土所有無量衆生蒙光照曜皆得決定速證阿耨多羅三藐三菩提所有地獄一切衆生皆獲安樂諸佛剎土六種震動於諸佛上又雨上妙栴檀沈水細粖之香以用供養爾時世尊說此般若波羅蜜多經是時所有一切菩薩摩訶薩各各發起平等之心發起慈愍心發起憶念利他心發起遠離一切罪障心發起種種利益之心發起般若波羅蜜多心是時世尊告聖觀自在菩薩摩訶薩汝等諦聽我今為汝說是聖佛母小字般若波羅蜜多真言曰曩莫入一舍引吉也二合反二母曩曳引三怛他去引誐哆引野引四㗚喝二合帝引五三麼藥二合反訖三二合沒䭾引野六怛儞也二合反他引八母𩕳引母𩕳引九摩賀引母曩曳引十娑嚩二合引賀引十一佛告聖觀自在菩薩摩訶薩言此聖佛母小字般若波羅蜜多真言一切諸佛由是得阿耨多羅三藐三菩提我亦由是小字般若波羅蜜多真言故得成無上正等菩提往昔有佛亦名釋迦牟尼如來於彼佛所聞說是法彼佛說言如是三世一切諸佛由斯法故方得成佛佛復告聖觀自在菩薩摩訶薩言我今為汝授其記別汝於人間未來世中得成佛道號普放光明吉祥寶峯王如來應正等覺汝得聽聞如是妙法應當受持讀誦若自書寫若教人書思惟解了復能為他一切衆生廣說其義令彼書寫是經於己舍宅受持讀誦於未來世速成無上正等菩提是時一切如來同證汝等我今為汝復說般若波羅蜜多陀羅尼曰怛儞也二合反他引一唵引二惹仁左反下同野惹野二鉢訥麼二合引避引三遏嚩無可反銘引四薩囉來假反下同薩哩抳尼貞反下同五尾哩尾哩六尾囉引尾哩七企哩企哩八儞嚩哆去弩鼻音九播引攞𡫸寧吉反十沒度引哆引囉抳十一布囉抳十二布囉野十三婆去誐嚩武末反帝十四薩㗚嚩二合引𠼬引十五麼麼此處稱名十六布囉野十七薩㗚嚩二合薩怛嚩二合引難上左十八薩㗚嚩二合揭㗚麼二合引十九嚩囉拏引𡫸二十尾戍引馱野二十一尾戍引䭾野二十二沒䭾引地瑟姹二合引𩕳引曩二十三娑嚩二合引賀引二十四佛告聖觀自在菩薩摩訶薩此勝妙法般若波羅蜜多陀羅尼是能出生一切諸佛菩薩之母若有衆生暫聞是法所作罪障悉皆消滅此法一切諸佛及衆菩薩經百俱胝劫說其功德不能得盡若能受持讀誦此陀羅尼者便同入一切曼拏攞中得受灌頂又如受持一切真言皆獲成就是時聖觀自在菩薩而白佛言世尊何故復說此般若波羅蜜多陀羅尼世尊告言我為愍念一切少善方便懈怠衆生是故說此般若波羅蜜多陀羅尼令彼受持讀誦若自書寫若教他書此等一切衆生速疾證得無上菩提如是如是世尊善說是般若波羅蜜多陀羅尼是時聖觀自在菩薩摩訶薩復白佛言世尊此法實未曾有世尊此法實未曾有善逝世尊大慈為欲救度一切少善方便懈怠衆生令得利益安樂說斯妙法是時世尊說此經已諸大聲聞并諸菩薩摩訶薩一切世間天人阿蘇囉彥達嚩等聞佛所說皆大歡喜信受奉行作禮而退
